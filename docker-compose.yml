services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:?POSTGRES_CONTAINER_NAME is required}
    environment:
      POSTGRES_DB: ${POSTGRES_BOOT_DB:-appforge}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_BOOT_DB:-appforge}"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME:?BACKEND_CONTAINER_NAME is required}
    environment:
      APP_ID: ${APP_ID:?APP_ID is required}
      DATABASE_PRIMARY: sql
      POSTGRES_HOST: ${POSTGRES_CONTAINER_NAME:?POSTGRES_CONTAINER_NAME is required}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_POOL_SIZE: 5
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: development
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      UPLOAD_EVENT_SHARED_SECRET: ${UPLOAD_EVENT_SHARED_SECRET:?UPLOAD_EVENT_SHARED_SECRET is required}
      EARLY_ACCESS_ENABLED: ${EARLY_ACCESS_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:3001"]}
      TRIAL_DURATION_DAYS: ${TRIAL_DURATION_DAYS:-7}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-true}
      UPLOADS_BUCKET: ${UPLOADS_BUCKET:-appforge-dev-uploads}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      DODO_PAYMENTS_BASE_URL: ${DODO_PAYMENTS_BASE_URL:-https://test.dodopayments.com}
      DODO_PAYMENTS_ENABLED: ${DODO_PAYMENTS_ENABLED:-false}
      DODO_PAYMENTS_API_KEY: ${DODO_PAYMENTS_API_KEY:-}
      DODO_PAYMENTS_WEBHOOK_KEY: ${DODO_PAYMENTS_WEBHOOK_KEY:-}
      DODO_PRODUCT_ID_PRO_MONTHLY: ${DODO_PRODUCT_ID_PRO_MONTHLY:-}
      DODO_PRODUCT_ID_PRO_ANNUAL: ${DODO_PRODUCT_ID_PRO_ANNUAL:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      ZEPTOMAIL_SEND_MAIL_TOKEN: ${ZEPTOMAIL_SEND_MAIL_TOKEN:-}
      ZEPTOMAIL_API_URL: ${ZEPTOMAIL_API_URL:-https://api.zeptomail.in/v1.1/email}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-AppForge Local}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME:?POSTGRES_VOLUME_NAME is required}
