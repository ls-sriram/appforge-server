# Development defaults (override in .secrets.conf if needed)
PORT=8080
HOST="0.0.0.0"
NODE_ENV="development"
COOKIE_SECURE=false
SESSION_COOKIE_NAME="appforge-session"
SESSION_EXPIRY_DAYS=14
CORS_ALLOWED_ORIGINS=["http://localhost:3000", "http://localhost:3001"]
APP_PUBLIC_URL="http://localhost:8080"

# Firebase
FIREBASE_PROJECT_ID="appforge-dev"

# Dodo Payments
DODO_PAYMENTS_BASE_URL="https://test.dodopayments.com"

# Uploads
UPLOADS_BUCKET="appforge-dev-uploads"
UPLOAD_MAX_BYTES=10485760  # 10MB

TRIAL_DURATION_DAYS=7

# Email (Regional)
ZEPTOMAIL_API_URL="https://api.zeptomail.in/v1.1/email"
